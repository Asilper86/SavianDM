name: Build and deploy PHP app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, zip

      - name: Install Composer dependencies
        working-directory: ./savianDM
        # Añadimos --ignore-platform-reqs para evitar el error de compatibilidad
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs

      - name: Install NPM and Build
        working-directory: ./savianDM
        run: |
          npm install
          npm run build

      - name: Zip artifact for deployment
        run: |
          cd savianDM
          zip -r ../release.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9599A03C3D0D4D66A3144ADF567607F9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5DF98A6DEDF34849BB958C80AD2E8236 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_462887EB95AD481F823169FA1EC52AFA }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'saviandm-pro'
          slot-name: 'Production'
          package: release.zip
